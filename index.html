    <script>
      (function() {
        // Landing pages are always dark to match the premium aesthetic
        const isLandingPath = window.location.pathname === '/' || window.location.pathname.startsWith('/p/');
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // If it's landing or user prefers dark, use dark theme
        const isDark = isLandingPath || theme === 'dark' || (!theme && prefersDark);
        
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#060606';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#f6f3ee';
        }
      })();
    </script>

    <!-- ═══ Service Worker Registration (production only) ═══ -->
    <script>
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
              // Check for updates periodically (every 60 minutes)
              setInterval(function() { reg.update(); }, 60 * 60 * 1000);
              
              // Notify when a new version is available
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New version ready — auto-activate on next navigation
                      console.log('[FigusUY PWA] Nueva versión disponible.');
                    }
                  });
                }
              });
            })
            .catch(function(err) {
              console.warn('[FigusUY PWA] SW registration failed:', err);
            });
        });
      }
    </script>
    <!-- ═══ End Service Worker Registration ═══ -->
