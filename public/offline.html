<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ea580c" />
  <title>FigusUY — Sin Conexión</title>
  <style>
    /* ─── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');

    :root {
      --bg: #060606;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #f5f5f5;
      --text-muted: #8a8a8a;
      --primary: #ea580c;
      --primary-glow: rgba(234, 88, 12, 0.25);
      --gradient-start: #3b82f6;
      --gradient-end: #8b5cf6;
    }

    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Container ───────────────────────────────────── */
    .offline-container {
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Icon ────────────────────────────────────────── */
    .offline-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
      position: relative;
      overflow: hidden;
    }

    .offline-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .offline-icon svg {
      width: 48px;
      height: 48px;
      fill: white;
      position: relative;
      z-index: 1;
    }

    /* ─── Title ───────────────────────────────────────── */
    .offline-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.75rem;
      line-height: 1.1;
    }

    .offline-title span {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      margin-top: 0.25rem;
    }

    /* ─── Body text ───────────────────────────────────── */
    .offline-message {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── Button ──────────────────────────────────────── */
    .offline-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .offline-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--primary-glow);
    }

    .offline-retry:active {
      transform: translateY(0);
    }

    .offline-retry svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      transition: transform 0.3s ease;
    }

    .offline-retry:hover svg {
      transform: rotate(180deg);
    }

    /* ─── Pulse dot indicator ─────────────────────────── */
    .offline-status {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <!-- App icon -->
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
          fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Message -->
    <h1 class="offline-title">
      Sin conexión
      <span>FigusUY</span>
    </h1>

    <p class="offline-message">
      Parece que no tenés conexión a Internet en este momento. 
      Verificá tu conexión Wi-Fi o datos móviles e intentá de nuevo.
    </p>

    <!-- Retry button -->
    <button class="offline-retry" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Reintentar
    </button>

    <!-- Status -->
    <div class="offline-status">
      <div class="pulse-dot"></div>
      Esperando conexión…
    </div>
  </div>

  <!-- Auto-retry when connection comes back -->
  <script>
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
